name: Daily Quantum Screener

on:
  schedule:
    # 매일 오전 9시 (한국 시간) = UTC 00:00
    - cron: '10 0 * * 1-5'   # 월~금 자동 실행
  workflow_dispatch:           # 수동 실행 버튼 (테스트용)

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests gspread google-auth

      - name: 스크리너 실행
        env:
          FRED_API_KEY:             ${{ secrets.FRED_API_KEY }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          SHEETS_URL:               ${{ secrets.SHEETS_URL }}
        run: |
          python screener_daily.py
